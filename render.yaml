databases:
  - name: notepad-db
    databaseName: notepad
    user: notepad_user
    plan: free

services:
  - type: web
    name: notepad-app
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: cd backend && node src/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: notepad-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
