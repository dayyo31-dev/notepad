databases:
  - name: notepad-db
    databaseName: notepad
    user: notepad_user
    plan: free

services:
  - type: web
    name: notepad-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: notepad-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        fromService:
          name: notepad-frontend
          type: web
          property: host

  - type: web
    name: notepad-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: notepad-api
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
